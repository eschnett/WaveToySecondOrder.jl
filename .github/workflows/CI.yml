name: CI

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Julia ${{ matrix.version }} / ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # See <https://julialang-s3.julialang.org/bin/versions.json> for available Julia versions
        include:
          - arch: "x64"
            os: "macOS-15-intel"
            version: "1.12"
          - arch: "x64"
            os: "ubuntu-24.04"
            version: "1.12"
          - arch: "x64"
            os: "windows-2025"
            version: "1.12"
          - arch: "arm64"
            os: "macOS-26"
            version: "1.12"
          - arch: "arm64"
            os: "ubuntu-24.04-arm"
            version: "1.12"
          - arch: "x86"
            os: "ubuntu-24.04"
            version: "1.12"
          - arch: "x64"
            os: "ubuntu-24.04"
            version: "1.11"
          - arch: "x64"
            os: "ubuntu-24.04"
            version: "1.10"

    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{matrix.arch}}
      - uses: julia-actions/cache@v3

      # `HexMeshes` is not yet in the General registry. Until it is,
      # inject it as a Git-tracked dependency so `Pkg.instantiate()`
      # (called by `julia-buildpkg` below) and the test-env build
      # (`julia-runtest`) can both resolve it. Tracks the `main` branch
      # by default; pin to a specific commit if reproducible CI is
      # needed. Delete this step once `HexMeshes` is registered.
      - name: Install unregistered HexMeshes dependency from GitHub
        shell: julia --color=yes --project=. {0}
        run: |
          using Pkg
          Pkg.develop(url = "https://github.com/eschnett/HexMeshes.jl.git")

      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: eschnett/WaveToySecondorder.jl
